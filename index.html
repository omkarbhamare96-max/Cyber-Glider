<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>City Runner 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { margin: 0; overflow: hidden; background-color: #87CEEB; touch-action: none; user-select: none; }
        #game-canvas { display: block; width: 100vw; height: 100vh; }

        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column; justify-content: space-between;
        }
        
        .hud { padding: 20px; display: flex; justify-content: space-between; align-items: flex-start; }
        .score-box { background: rgba(255, 255, 255, 0.8); border: 2px solid #333; padding: 10px 20px; border-radius: 12px; }
        .score-label { font-size: 12px; color: #333; font-weight: bold; }
        .score-val { font-size: 28px; font-weight: 900; color: #111; }

        .controls-hint { padding: 20px; text-align: center; color: #fff; text-shadow: 1px 1px 4px #000; font-size: 16px; font-weight: bold; }

        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: auto; transition: opacity 0.3s;
        }
        .hidden { opacity: 0; pointer-events: none; }

        h1 { font-size: 48px; font-weight: 900; color: #FFcc00; text-shadow: 2px 2px 0 #000; margin-bottom: 10px; }
        .subtitle { color: #fff; font-size: 16px; font-weight: bold; margin-bottom: 40px; }
        
        .btn {
            background: #ff5500; border: 2px solid #fff; padding: 15px 40px;
            border-radius: 30px; color: white; font-size: 20px; font-weight: 900;
            cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); background: #ff7700; }
    </style>
</head>
<body>

    <canvas id="game-canvas"></canvas>

    <div class="ui-layer">
        <div class="hud">
            <div class="score-box">
                <div class="score-label">DISTANCE</div>
                <div class="score-val" id="score-display">0</div>
            </div>
        </div>
        <div class="controls-hint">⬅️ RIGHT/LEFT ➡️ | ⬆️ JUMP | ⬇️ SLIDE</div>
    </div>

    <div id="start-screen" class="screen">
        <h1>CITY RUNNER 3D</h1>
        <div class="subtitle">RUN, JUMP, AND SLIDE!</div>
        <button class="btn" onclick="startGame()">START RUNNING</button>
    </div>

    <div id="game-over-screen" class="screen hidden">
        <h1>BUSTED!</h1>
        <div class="score-box" style="margin-bottom: 30px; text-align: center;">
            <div class="score-label">FINAL SCORE</div>
            <div class="score-val" id="final-score" style="font-size: 40px;">0</div>
        </div>
        <button class="btn" onclick="startGame()">PLAY AGAIN</button>
    </div>

<script>
    const canvas = document.getElementById('game-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB); // Sky blue
    scene.fog = new THREE.Fog(0x87CEEB, 40, 150);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 6, 15);
    camera.lookAt(0, 2, -20);

    // Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 20, 10);
    scene.add(dirLight);

    // Ground
    const groundGeo = new THREE.PlaneGeometry(30, 400);
    const groundMat = new THREE.MeshLambertMaterial({ color: 0x333333 }); // Asphalt
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // Lane markers
    const lines = [];
    for(let i=0; i<20; i++) {
        const lineGeo = new THREE.PlaneGeometry(0.2, 3);
        const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const lineL = new THREE.Mesh(lineGeo, lineMat);
        const lineR = new THREE.Mesh(lineGeo, lineMat);
        lineL.rotation.x = -Math.PI / 2;
        lineR.rotation.x = -Math.PI / 2;
        lineL.position.set(-2, 0.01, -i*10);
        lineR.position.set(2, 0.01, -i*10);
        scene.add(lineL); scene.add(lineR);
        lines.push(lineL, lineR);
    }

    // Buildings
    const buildings = [];
    for(let i=0; i<40; i++) {
        let h = 10 + Math.random() * 20;
        let bMat = new THREE.MeshLambertMaterial({ color: Math.random() > 0.5 ? 0x445566 : 0x554444 });
        let b = new THREE.Mesh(new THREE.BoxGeometry(5, h, 6), bMat);
        let isLeft = i % 2 === 0;
        b.position.set(isLeft ? -10 - Math.random()*5 : 10 + Math.random()*5, h/2, -Math.random()*200);
        scene.add(b);
        buildings.push(b);
    }

    // --- PLAYER CREATION (Humanoid) ---
    const playerGroup = new THREE.Group();
    scene.add(playerGroup);

    const skinMat = new THREE.MeshLambertMaterial({ color: 0xffccaa });
    const shirtMat = new THREE.MeshLambertMaterial({ color: 0xff0000 });
    const pantsMat = new THREE.MeshLambertMaterial({ color: 0x0044cc });

    // Torso
    const torso = new THREE.Mesh(new THREE.BoxGeometry(1, 1.5, 0.5), shirtMat);
    torso.position.y = 2;
    playerGroup.add(torso);

    // Head
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), skinMat);
    head.position.y = 3.1;
    playerGroup.add(head);

    // Limbs with Pivots
    function createLimb(mat, width, length, depth, posX, posY, posZ) {
        const pivot = new THREE.Group();
        pivot.position.set(posX, posY, posZ);
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(width, length, depth), mat);
        mesh.position.y = -length / 2; // offset so it rotates from the top
        pivot.add(mesh);
        playerGroup.add(pivot);
        return pivot;
    }

    const leftArm = createLimb(skinMat, 0.3, 1.2, 0.3, -0.7, 2.6, 0);
    const rightArm = createLimb(skinMat, 0.3, 1.2, 0.3, 0.7, 2.6, 0);
    const leftLeg = createLimb(pantsMat, 0.4, 1.4, 0.4, -0.25, 1.25, 0);
    const rightLeg = createLimb(pantsMat, 0.4, 1.4, 0.4, 0.25, 1.25, 0);

    // --- GAME VARIABLES ---
    const LANE_WIDTH = 4;
    let currentLane = 0; // -1, 0, 1
    let targetX = 0;
    
    let isJumping = false;
    let isSliding = false;
    let playerVelocityY = 0;
    const gravity = -0.012;
    const jumpPower = 0.25;

    let gameSpeed = 0.2; // Starts slower!
    let score = 0;
    let isGameOver = true;
    let runAnimationTime = 0;

    const obstacles = [];
    const obsMatJump = new THREE.MeshLambertMaterial({ color: 0xff8800 }); // Orange barrier
    const obsMatSlide = new THREE.MeshLambertMaterial({ color: 0x00ccff }); // Blue overhead

    function spawnObstacle(zPos) {
        const type = Math.random() > 0.5 ? 'jump' : 'slide';
        let obs;
        if (type === 'jump') {
            obs = new THREE.Mesh(new THREE.BoxGeometry(3, 1.5, 1), obsMatJump);
            obs.position.y = 0.75;
        } else {
            obs = new THREE.Group();
            let beam = new THREE.Mesh(new THREE.BoxGeometry(4, 1, 1), obsMatSlide);
            beam.position.y = 3.5;
            let pillar1 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 4, 0.5), obsMatSlide);
            pillar1.position.set(-1.75, 2, 0);
            let pillar2 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 4, 0.5), obsMatSlide);
            pillar2.position.set(1.75, 2, 0);
            obs.add(beam, pillar1, pillar2);
        }

        const lane = Math.floor(Math.random() * 3) - 1;
        obs.position.set(lane * LANE_WIDTH, 0, zPos);
        obs.userData = { type: type, hitBox: new THREE.Box3() };
        scene.add(obs);
        obstacles.push(obs);
    }

    function generateTrack() {
        obstacles.forEach(o => scene.remove(o));
        obstacles.length = 0;
        for(let i = 0; i < 15; i++) {
            let z = -50 - (i * 25);
            spawnObstacle(z);
        }
    }

    // --- INPUT CONTROLS ---
    function moveLeft() { if (currentLane > -1 && !isGameOver) currentLane--; }
    function moveRight() { if (currentLane < 1 && !isGameOver) currentLane++; }
    function jump() {
        if (!isJumping && !isSliding && !isGameOver) {
            isJumping = true;
            playerVelocityY = jumpPower;
        }
    }
    function slide() {
        if (!isSliding && !isJumping && !isGameOver) {
            isSliding = true;
            playerGroup.scale.y = 0.5; // Shrink
            playerGroup.position.y = -1; // Duck down
            setTimeout(() => {
                if(!isGameOver) {
                    isSliding = false;
                    playerGroup.scale.y = 1;
                    playerGroup.position.y = 0;
                }
            }, 800);
        }
    }

    window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft' || e.key === 'a') moveLeft();
        if (e.key === 'ArrowRight' || e.key === 'd') moveRight();
        if (e.key === 'ArrowUp' || e.key === 'w') jump();
        if (e.key === 'ArrowDown' || e.key === 's') slide();
    });

    let touchStartX = 0, touchStartY = 0;
    window.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].screenX;
        touchStartY = e.changedTouches[0].screenY;
    });
    window.addEventListener('touchend', e => {
        let deltaX = e.changedTouches[0].screenX - touchStartX;
        let deltaY = e.changedTouches[0].screenY - touchStartY;
        if (Math.abs(deltaX) > Math.abs(deltaY)) {
            if (deltaX > 30) moveRight();
            else if (deltaX < -30) moveLeft();
        } else {
            if (deltaY < -30) jump();
            else if (deltaY > 30) slide();
        }
    });

    // --- LOGIC ---
    function startGame() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-over-screen').classList.add('hidden');
        score = 0;
        gameSpeed = 0.2; 
        currentLane = 0;
        playerGroup.position.set(0, 0, 0);
        playerGroup.scale.y = 1;
        isJumping = false;
        isSliding = false;
        generateTrack();
        isGameOver = false;
    }

    function gameOver() {
        isGameOver = true;
        document.getElementById('final-score').innerText = Math.floor(score);
        document.getElementById('game-over-screen').classList.remove('hidden');
    }

    const playerBox = new THREE.Box3();

    function animate() {
        requestAnimationFrame(animate);

        if (!isGameOver) {
            gameSpeed += 0.00005; 
            score += gameSpeed * 10;
            document.getElementById('score-display').innerText = Math.floor(score);

            // Move lines
            lines.forEach(l => {
                l.position.z += gameSpeed;
                if(l.position.z > 5) l.position.z -= 100;
            });

            // Move buildings
            buildings.forEach(b => {
                b.position.z += gameSpeed;
                if(b.position.z > 20) b.position.z -= 200;
            });

            // Player Lane Movement
            targetX = currentLane * LANE_WIDTH;
            playerGroup.position.x += (targetX - playerGroup.position.x) * 0.15;

            // Player Jump Physics
            if (isJumping) {
                playerVelocityY += gravity;
                playerGroup.position.y += playerVelocityY;
                if (playerGroup.position.y <= 0) {
                    playerGroup.position.y = 0;
                    isJumping = false;
                    playerVelocityY = 0;
                }
            }

            // --- ANIMATIONS ---
            if (!isSliding && !isJumping) {
                runAnimationTime += gameSpeed * 1.5;
                leftArm.rotation.x = Math.sin(runAnimationTime) * 1;
                rightArm.rotation.x = -Math.sin(runAnimationTime) * 1;
                leftLeg.rotation.x = -Math.sin(runAnimationTime) * 1;
                rightLeg.rotation.x = Math.sin(runAnimationTime) * 1;
            } else if (isJumping) {
                leftArm.rotation.x = -Math.PI/4; rightArm.rotation.x = Math.PI/4;
                leftLeg.rotation.x = -Math.PI/6; rightLeg.rotation.x = Math.PI/6;
            } else if (isSliding) {
                leftArm.rotation.x = Math.PI/2; rightArm.rotation.x = Math.PI/2;
                leftLeg.rotation.x = Math.PI/4; rightLeg.rotation.x = Math.PI/4;
            }

            // Obstacles & Collision
            playerBox.setFromObject(torso); 
            playerBox.expandByScalar(0.2);

            obstacles.forEach(obs => {
                obs.position.z += gameSpeed;
                
                if (obs.userData.type === 'jump') {
                    obs.userData.hitBox.setFromCenterAndSize(
                        new THREE.Vector3(obs.position.x, 0.75, obs.position.z),
                        new THREE.Vector3(3, 1.5, 1)
                    );
                } else {
                    obs.userData.hitBox.setFromCenterAndSize(
                        new THREE.Vector3(obs.position.x, 3.5, obs.position.z),
                        new THREE.Vector3(4, 1, 1)
                    );
                }

                if (playerBox.intersectsBox(obs.userData.hitBox)) {
                    gameOver();
                }

                if (obs.position.z > 10) {
                    obs.position.z -= 300;
                    obs.position.x = (Math.floor(Math.random() * 3) - 1) * LANE_WIDTH;
                }
            });
        }

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
