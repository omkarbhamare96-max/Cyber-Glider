<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Run 3D - Ultimate</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { margin: 0; overflow: hidden; background-color: #0d0221; touch-action: none; user-select: none; }
        #game-canvas { display: block; width: 100vw; height: 100vh; }

        /* UI Overlays - Glassmorphism */
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column; justify-content: space-between;
        }
        
        .hud { padding: 30px; display: flex; justify-content: space-between; align-items: flex-start; }
        .score-box { 
            background: rgba(13, 2, 33, 0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 242, 254, 0.3); padding: 12px 25px; border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center;
        }
        .score-label { font-size: 11px; color: #00f2fe; font-weight: 800; letter-spacing: 2px; margin-bottom: 4px; }
        .score-val { font-size: 32px; font-weight: 900; color: #fff; text-shadow: 0 0 10px rgba(0,242,254,0.5); }
        .core-val { color: #fffb00; text-shadow: 0 0 10px rgba(255,251,0,0.5); }

        .controls-hint { 
            padding: 20px; text-align: center; color: rgba(255,255,255,0.6); 
            font-size: 14px; font-weight: 700; letter-spacing: 3px; 
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }

        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 2, 15, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: auto; transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hidden { opacity: 0; pointer-events: none; transform: scale(1.05); }

        h1 { 
            font-size: 56px; font-weight: 900; color: #fff; letter-spacing: 6px; 
            text-shadow: 0 0 20px #f0f, 0 0 40px #f0f; margin-bottom: 5px; text-align: center;
        }
        .subtitle { color: #00f2fe; font-size: 16px; letter-spacing: 8px; font-weight: 800; margin-bottom: 50px; text-shadow: 0 0 10px #00f2fe; }
        
        .btn {
            background: linear-gradient(45deg, #f0f, #00f2fe); border: none; padding: 18px 50px;
            border-radius: 50px; color: white; font-size: 18px; font-weight: 900; letter-spacing: 3px;
            cursor: pointer; box-shadow: 0 10px 40px rgba(255, 0, 255, 0.4); 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 15px 50px rgba(0, 242, 254, 0.6); }
        .btn:active { transform: translateY(0) scale(0.98); }

        #game-over-screen h1 { color: #ff3b30; text-shadow: 0 0 30px #ff3b30; }
        .stats-grid { display: flex; gap: 20px; margin-bottom: 40px; }
    </style>
</head>
<body>

    <canvas id="game-canvas"></canvas>

    <div class="ui-layer">
        <div class="hud">
            <div class="score-box">
                <div class="score-label">DISTANCE</div>
                <div class="score-val" id="score-display">0</div>
            </div>
            <div class="score-box" style="border-color: rgba(255, 251, 0, 0.4);">
                <div class="score-label" style="color: #fffb00;">CORES</div>
                <div class="score-val core-val" id="coins-display">0</div>
            </div>
        </div>
        <div class="controls-hint">⬅️ SWIPE / ARROWS ➡️ | ⬆️ JUMP | ⬇️ SLIDE</div>
    </div>

    <div id="start-screen" class="screen">
        <h1>NEON RUN</h1>
        <div class="subtitle">SYNTHWAVE PROTOCOL</div>
        <button class="btn" onclick="startGame()">JACK IN</button>
    </div>

    <div id="game-over-screen" class="screen hidden">
        <h1>SYSTEM FAILURE</h1>
        <div class="stats-grid">
            <div class="score-box">
                <div class="score-label">FINAL SCORE</div>
                <div class="score-val" id="final-score">0</div>
            </div>
            <div class="score-box" style="border-color: rgba(255, 251, 0, 0.4);">
                <div class="score-label" style="color: #fffb00;">CORES COLLECTED</div>
                <div class="score-val core-val" id="final-coins">0</div>
            </div>
        </div>
        <button class="btn" onclick="startGame()">REBOOT SYSTEM</button>
    </div>

<script>
    // --- 1. ENGINE SETUP & RENDERING ---
    const canvas = document.getElementById('game-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a021a); 
    scene.fog = new THREE.FogExp2(0x0a021a, 0.012);

    // Dynamic Camera
    const cameraGroup = new THREE.Group();
    const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 300);
    camera.position.set(0, 7, 18);
    camera.lookAt(0, 2, -20);
    cameraGroup.add(camera);
    scene.add(cameraGroup);

    // --- 2. LIGHTING & SHADOWS ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);
    
    const hemiLight = new THREE.HemisphereLight(0xff00ff, 0x00f2fe, 0.5);
    scene.add(hemiLight);

    const dirLight = new THREE.DirectionalLight(0xffaa00, 1.2);
    dirLight.position.set(15, 30, 15);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 1024;
    dirLight.shadow.mapSize.height = 1024;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 100;
    dirLight.shadow.camera.left = -30;
    dirLight.shadow.camera.right = 30;
    dirLight.shadow.camera.top = 40;
    dirLight.shadow.camera.bottom = -20;
    scene.add(dirLight);

    // --- 3. ENVIRONMENT (Neon City) ---
    // Ground
    const groundGeo = new THREE.PlaneGeometry(80, 500);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x05010d, roughness: 0.1, metalness: 0.8 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Glowing Neon Grid Lines
    const gridHelper = new THREE.GridHelper(80, 40, 0xf0f, 0x00f2fe);
    gridHelper.position.y = 0.05;
    gridHelper.material.transparent = true;
    gridHelper.material.opacity = 0.3;
    scene.add(gridHelper);

    // Buildings
    const buildings = [];
    const bMats = [
        new THREE.MeshStandardMaterial({ color: 0x110222, roughness: 0.2 }),
        new THREE.MeshStandardMaterial({ color: 0x0a1128, roughness: 0.2 })
    ];
    for(let i=0; i<40; i++) {
        let h = 15 + Math.random() * 40;
        let w = 4 + Math.random() * 6;
        let bGeo = new THREE.BoxGeometry(w, h, w);
        let b = new THREE.Mesh(bGeo, bMats[i%2]);
        b.castShadow = true; b.receiveShadow = true;
        let isLeft = i % 2 === 0;
        b.position.set(isLeft ? -15 - Math.random()*15 : 15 + Math.random()*15, h/2, -Math.random()*300);
        
        // Neon trim on buildings
        let edges = new THREE.EdgesGeometry(bGeo);
        let line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: isLeft ? 0xf0f : 0x00f2fe, transparent: true, opacity: 0.5 }));
        b.add(line);

        scene.add(b);
        buildings.push(b);
    }

    // --- 4. PLAYER CREATION (Cyber Runner) ---
    const playerGroup = new THREE.Group();
    scene.add(playerGroup);

    const suitMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.3, metalness: 0.8 });
    const neonMat = new THREE.MeshBasicMaterial({ color: 0x00f2fe }); // Glowing cyan

    // Torso
    const torso = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.8, 0.6), suitMat);
    torso.position.y = 2.2;
    torso.castShadow = true;
    playerGroup.add(torso);
    
    // Core Glow
    const chestGlow = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.8), neonMat);
    chestGlow.position.set(0, 0, 0.31);
    torso.add(chestGlow);

    // Head
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), suitMat);
    head.position.y = 3.5;
    head.castShadow = true;
    playerGroup.add(head);

    // Visor
    const visor = new THREE.Mesh(new THREE.PlaneGeometry(0.6, 0.2), new THREE.MeshBasicMaterial({color: 0xf0f}));
    visor.position.set(0, 0, 0.41);
    head.add(visor);

    function createLimb(posX, posY, posZ) {
        const pivot = new THREE.Group();
        pivot.position.set(posX, posY, posZ);
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.5, 0.4), suitMat);
        mesh.position.y = -0.75; 
        mesh.castShadow = true;
        pivot.add(mesh);
        
        // Neon stripes on limbs
        const stripe = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.1, 0.45), neonMat);
        stripe.position.y = -0.75;
        pivot.add(stripe);

        playerGroup.add(pivot);
        return pivot;
    }

    const leftArm = createLimb(-0.9, 2.8, 0);
    const rightArm = createLimb(0.9, 2.8, 0);
    const leftLeg = createLimb(-0.35, 1.3, 0);
    const rightLeg = createLimb(0.35, 1.3, 0);

    // --- 5. PARTICLES & JUICE ---
    const particles = [];
    const speedLines = [];

    // Speed Lines (Wind effect)
    for(let i=0; i<30; i++) {
        let geo = new THREE.PlaneGeometry(0.05, 4 + Math.random() * 6);
        let mat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.2 });
        let line = new THREE.Mesh(geo, mat);
        line.rotation.x = Math.PI / 2;
        line.position.set((Math.random()-0.5)*30, Math.random()*10, -Math.random()*100);
        scene.add(line);
        speedLines.push(line);
    }

    function createExplosion(x, y, z, color, count=15) {
        const pGeo = new THREE.BoxGeometry(0.3, 0.3, 0.3);
        const pMat = new THREE.MeshBasicMaterial({ color: color });
        for(let i=0; i<count; i++) {
            let p = new THREE.Mesh(pGeo, pMat);
            p.position.set(x, y, z);
            p.velocity = new THREE.Vector3((Math.random()-0.5)*0.8, Math.random()*0.8, (Math.random()-0.5)*0.8);
            scene.add(p);
            particles.push(p);
        }
    }

    // Camera Shake
    let shakeTimer = 0;
    function shakeCamera() { shakeTimer = 15; }

    // --- 6. GAME LOGIC & OBSTACLES ---
    const LANE_WIDTH = 4;
    let currentLane = 0; 
    let targetX = 0;
    
    let isJumping = false; let isSliding = false;
    let playerVelocityY = 0;
    const gravity = -0.015; const jumpPower = 0.32;

    let baseSpeed = 0.3; let gameSpeed = 0; 
    let score = 0; let coinsCollected = 0;
    let isGameOver = true; let animTime = 0;

    const obstacles = []; const coins = [];
    const obsMatJump = new THREE.MeshStandardMaterial({ color: 0xf0f, emissive: 0x500050 }); 
    const obsMatSlide = new THREE.MeshStandardMaterial({ color: 0x00f2fe, emissive: 0x005555 }); 
    const coinGeo = new THREE.OctahedronGeometry(0.6);
    const coinMat = new THREE.MeshStandardMaterial({ color: 0xfffb00, emissive: 0xaa5500, flatShading: true });

    function spawnEntity(zPos) {
        let rand = Math.random();
        const lane = Math.floor(Math.random() * 3) - 1;
        let obj;

        if (rand < 0.25) {
            // Spawn Coin
            obj = new THREE.Mesh(coinGeo, coinMat);
            obj.position.set(lane * LANE_WIDTH, 1.5, zPos);
            obj.userData = { type: 'coin', hitBox: new THREE.Box3() };
            scene.add(obj);
            coins.push(obj);
        } else {
            // Spawn Obstacle
            const type = Math.random() > 0.5 ? 'jump' : 'slide';
            if (type === 'jump') {
                obj = new THREE.Mesh(new THREE.BoxGeometry(3.6, 1.5, 1.2), obsMatJump);
                obj.position.y = 0.75;
            } else {
                obj = new THREE.Group();
                let beam = new THREE.Mesh(new THREE.BoxGeometry(4.2, 1, 1), obsMatSlide);
                beam.position.y = 3.5;
                let p1 = new THREE.Mesh(new THREE.BoxGeometry(0.6, 4, 0.6), obsMatSlide); p1.position.set(-1.8, 2, 0);
                let p2 = new THREE.Mesh(new THREE.BoxGeometry(0.6, 4, 0.6), obsMatSlide); p2.position.set(1.8, 2, 0);
                obj.add(beam, p1, p2);
            }
            obj.position.set(lane * LANE_WIDTH, 0, zPos);
            obj.castShadow = true; obj.receiveShadow = true;
            obj.userData = { type: type, hitBox: new THREE.Box3() };
            scene.add(obj);
            obstacles.push(obj);
        }
    }

    function generateTrack() {
        obstacles.forEach(o => scene.remove(o)); obstacles.length = 0;
        coins.forEach(c => scene.remove(c)); coins.length = 0;
        for(let i = 0; i < 20; i++) spawnEntity(-40 - (i * 25));
    }

    // --- 7. INPUT HANDLING ---
    function moveLeft() { if (currentLane > -1 && !isGameOver) currentLane--; }
    function moveRight() { if (currentLane < 1 && !isGameOver) currentLane++; }
    function jump() { if (!isJumping && !isSliding && !isGameOver) { isJumping = true; playerVelocityY = jumpPower; } }
    function slide() {
        if (!isSliding && !isJumping && !isGameOver) {
            isSliding = true; playerGroup.scale.y = 0.45; playerGroup.position.y = -1.2;
            setTimeout(() => { if(!isGameOver) { isSliding = false; playerGroup.scale.y = 1; playerGroup.position.y = 0; } }, 750);
        }
    }

    window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft' || e.key === 'a') moveLeft();
        if (e.key === 'ArrowRight' || e.key === 'd') moveRight();
        if (e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') jump();
        if (e.key === 'ArrowDown' || e.key === 's') slide();
    });

    let tSX = 0, tSY = 0;
    window.addEventListener('touchstart', e => { tSX = e.changedTouches[0].screenX; tSY = e.changedTouches[0].screenY; });
    window.addEventListener('touchend', e => {
        let dX = e.changedTouches[0].screenX - tSX, dY = e.changedTouches[0].screenY - tSY;
        if (Math.abs(dX) > Math.abs(dY)) { if (dX > 30) moveRight(); else if (dX < -30) moveLeft(); } 
        else { if (dY < -30) jump(); else if (dY > 30) slide(); }
    });

    // --- 8. STATE MANAGEMENT ---
    function startGame() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-over-screen').classList.add('hidden');
        score = 0; coinsCollected = 0; gameSpeed = baseSpeed; currentLane = 0;
        playerGroup.position.set(0, 0, 0); playerGroup.scale.y = 1; playerGroup.visible = true;
        isJumping = false; isSliding = false;
        generateTrack();
        document.getElementById('coins-display').innerText = '0';
        isGameOver = false;
    }

    function gameOver() {
        isGameOver = true;
        shakeCamera();
        createExplosion(playerGroup.position.x, playerGroup.position.y + 2, playerGroup.position.z, 0xff3b30, 40);
        playerGroup.visible = false;
        
        document.getElementById('final-score').innerText = Math.floor(score);
        document.getElementById('final-coins').innerText = coinsCollected;
        setTimeout(() => document.getElementById('game-over-screen').classList.remove('hidden'), 1200);
    }

    const playerBox = new THREE.Box3();

    // --- 9. ANIMATION LOOP ---
    function animate() {
        requestAnimationFrame(animate);

        if (!isGameOver) {
            gameSpeed += 0.00008; // Endless scaling
            score += gameSpeed * 8;
            document.getElementById('score-display').innerText = Math.floor(score);

            // 1. Move Environment (Grid & Speed Lines)
            gridHelper.position.z += gameSpeed;
            if (gridHelper.position.z > 20) gridHelper.position.z -= 20;

            speedLines.forEach(l => {
                l.position.z += gameSpeed * 3;
                if(l.position.z > 10) l.position.z -= 150;
            });

            buildings.forEach(b => {
                b.position.z += gameSpeed;
                if(b.position.z > 30) b.position.z -= 250;
            });

            // 2. Player Physics & Smooth Lane Changes
            targetX = currentLane * LANE_WIDTH;
            playerGroup.position.x += (targetX - playerGroup.position.x) * 0.18;
            
            // Dynamic Camera & Tilt
            playerGroup.rotation.z = (playerGroup.position.x - targetX) * 0.15; // Lean into turns
            cameraGroup.position.x = playerGroup.position.x * 0.3; // Camera follows slightly

            if (isJumping) {
                playerVelocityY += gravity;
                playerGroup.position.y += playerVelocityY;
                if (playerGroup.position.y <= 0) {
                    playerGroup.position.y = 0; isJumping = false; playerVelocityY = 0;
                    createExplosion(playerGroup.position.x, 0, playerGroup.position.z, 0xffffff, 5); // Landing dust
                }
            }

            // 3. Procedural Running Animation
            if (!isSliding && !isJumping) {
                animTime += gameSpeed * 1.8;
                leftArm.rotation.x = Math.sin(animTime) * 1.2; rightArm.rotation.x = -Math.sin(animTime) * 1.2;
                leftLeg.rotation.x = -Math.sin(animTime) * 1.2; rightLeg.rotation.x = Math.sin(animTime) * 1.2;
                playerGroup.position.y = Math.abs(Math.sin(animTime * 2)) * 0.2; // Bounce
            } else if (isJumping) {
                leftArm.rotation.x = -Math.PI/3; rightArm.rotation.x = Math.PI/3;
                leftLeg.rotation.x = -Math.PI/6; rightLeg.rotation.x = Math.PI/6;
            } else if (isSliding) {
                leftArm.rotation.x = Math.PI/1.5; rightArm.rotation.x = Math.PI/1.5;
                leftLeg.rotation.x = Math.PI/3; rightLeg.rotation.x = Math.PI/3;
            }

            // 4. Collision & Entity Recycling
            playerBox.setFromObject(torso); 
            playerBox.expandByScalar(0.15); // Forgiving hitbox

            // Handle Obstacles
            obstacles.forEach(obs => {
                obs.position.z += gameSpeed;
                if (obs.userData.type === 'jump') obs.userData.hitBox.setFromCenterAndSize(new THREE.Vector3(obs.position.x, 0.75, obs.position.z), new THREE.Vector3(3.2, 1.2, 0.8));
                else obs.userData.hitBox.setFromCenterAndSize(new THREE.Vector3(obs.position.x, 3.5, obs.position.z), new THREE.Vector3(3.8, 0.8, 0.8));
                
                if (playerBox.intersectsBox(obs.userData.hitBox)) gameOver();
                if (obs.position.z > 15) { obs.position.z -= 300; obs.position.x = (Math.floor(Math.random() * 3) - 1) * LANE_WIDTH; }
            });

            // Handle Coins
            coins.forEach(coin => {
                coin.position.z += gameSpeed;
                coin.rotation.x += 0.05; coin.rotation.y += 0.05;
                coin.userData.hitBox.setFromCenterAndSize(coin.position, new THREE.Vector3(1.5, 1.5, 1.5));
                
                if (playerBox.intersectsBox(coin.userData.hitBox)) {
                    createExplosion(coin.position.x, coin.position.y, coin.position.z, 0xfffb00, 8);
                    coin.position.z -= 300; coin.position.x = (Math.floor(Math.random() * 3) - 1) * LANE_WIDTH;
                    coinsCollected++;
                    document.getElementById('coins-display').innerText = coinsCollected;
                    document.getElementById('coins-display').style.transform = "scale(1.5)";
                    setTimeout(()=> document.getElementById('coins-display').style.transform = "scale(1)", 100);
                }
                if (coin.position.z > 15) { coin.position.z -= 300; coin.position.x = (Math.floor(Math.random() * 3) - 1) * LANE_WIDTH; }
            });
        }

        // Camera Shake Juice
        if (shakeTimer > 0) {
            camera.position.x = (Math.random()-0.5) * 1.5;
            camera.position.y = 7 + (Math.random()-0.5) * 1.5;
            shakeTimer--;
        } else {
            camera.position.x = 0; camera.position.y = 7;
        }

        // Update Particles
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.position.add(p.velocity);
            p.scale.multiplyScalar(0.92);
            if (p.scale.x < 0.05) { scene.remove(p); particles.splice(i, 1); }
        }

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
